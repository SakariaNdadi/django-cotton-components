<div class="flex flex-col text-primary-600 dark:text-primary-300">
    <div class="flex items-center justify-start gap-2 font-medium has-[:disabled]:opacity-75">
        <input id="{{ id }}" type="radio"
               class="before:content[''] relative h-4 w-4 appearance-none rounded-full border border-primary-300 bg-primary-50 before:invisible before:absolute before:left-1/2 before:top-1/2 before:h-1.5 before:w-1.5 before:-translate-x-1/2 before:-translate-y-1/2 before:rounded-full before:bg-primary-100 checked:border-black checked:bg-black checked:before:visible focus:outline focus:outline-2 focus:outline-offset-2 focus:outline-primary-800 checked:focus:outline-black disabled:cursor-not-allowed dark:border-primary-700 dark:bg-primary-900 dark:before:bg-black dark:checked:border-white dark:checked:bg-white dark:focus:outline-primary-300 dark:checked:focus:outline-white"
               name="{{ name }}" value="" aria-describedby="{{ id }}Description">
        <label for="{{ id }}" class="text-sm">{{ label }}</label>
    </div>

    {% if description %}
        <span id="{{ id }}Description" class="ml-6 text-sm">{{ description }}</span>
    {% endif %}
</div>
