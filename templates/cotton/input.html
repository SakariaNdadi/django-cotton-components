<c-vars type="text" errors />

<div class="flex w-full max-w-xs flex-col gap-1 text-primary-600 dark:text-primary-300">
    {% if label %}
        <label for="{{ id }}" class="w-fit pl-0.5 text-sm">{{ label }}</label>
    {% endif %}
    <input id="{{ id }}" type="{{ type }}" {{ attrs }}
           class="w-full rounded-md border border-primary-300 bg-primary-50 px-2 py-2 text-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-black disabled:cursor-not-allowed disabled:opacity-75 dark:border-primary-700 dark:bg-primary-900/50 dark:focus-visible:outline-white {% if errors %}border-red-500{% endif %}"
           name="{{ name }}" placeholder="{{ placeholder }}" />
    {% if errors %}
        <div class="text-red-500 text-sm mt-1">{{ errors.as_text }}</div>
    {% endif %}
</div>
