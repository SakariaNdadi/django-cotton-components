<c-vars type="text" errors />
<div>
    {% if label %}
    <label for="phoneInput" class="w-fit pl-0.5 text-sm">{{ label }}</label>
    {% endif %}

    <input type="{{ type }}" {{ attrs }}
        class="w-full rounded-md border   bg-neutral-50 px-2 py-2 text-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-black disabled:cursor-not-allowed disabled:opacity-75 dark:border-neutral-700 dark:bg-neutral-900/50 dark:focus-visible:outline-white {% if errors %}border-red-500{% endif %}">

    {% if errors %}
    <div class="text-red-500 text-sm mt-1">{{ errors.as_text }}</div>
    {% endif %}
</div>
