<div class="flex w-full max-w-md flex-col gap-1 text-primary-600 dark:text-primary-300">
    {% if label %}
        <label for="{{ id }}" class="w-fit pl-0.5 text-sm">{{ label }}</label>
    {% endif %}
    <textarea id="{{ id }}" name="{{ name }}" {{ attrs }}
              class="w-full rounded-md border   bg-primary-50 px-2.5 py-2 text-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-black disabled:cursor-not-allowed disabled:opacity-75 dark:border-primary-700 dark:bg-primary-900/50 dark:focus-visible:outline-white"
              rows="3" placeholder="{{ placeholder }}"></textarea>
</div>
