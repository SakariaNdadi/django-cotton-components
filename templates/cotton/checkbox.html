<div class="flex flex-col items-start">
    <label for="{{ id }}"
           class="flex cursor-pointer items-center gap-2 text-sm font-medium text-primary-600 dark:text-primary-300 [&:has(input:checked)]:text-primary-900 dark:[&:has(input:checked)]:text-white [&:has(input:disabled)]:opacity-75 [&:has(input:disabled)]:cursor-not-allowed">
        <div class="relative flex items-center">
            <input id="{{ id }}" type="checkbox" name="{{ name }}"
                   class="before:content[''] peer relative size-4 cursor-pointer appearance-none overflow-hidden rounded border border-primary-300 bg-primary-50 before:absolute before:inset-0 checked:border-black checked:before:bg-black focus:outline focus:outline-2 focus:outline-offset-2 focus:outline-primary-800 checked:focus:outline-black active:outline-offset-0 disabled:cursor-not-allowed dark:border-primary-700 dark:bg-primary-900 dark:checked:border-white dark:checked:before:bg-white dark:focus:outline-primary-300 dark:checked:focus:outline-white"
                   aria-describedby="checkboxDescription" />
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" stroke="currentColor"
                 fill="none" stroke-width="4"
                 class="pointer-events-none invisible absolute left-1/2 top-1/2 size-3 -translate-x-1/2 -translate-y-1/2 text-primary-100 peer-checked:visible dark:text-black">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </div>
        <span>{{ label }}</span>
    </label>

    {% if description %}
        <span id="checkboxDescription" class="ml-6 text-sm text-primary-600 dark:text-primary-300">{{ description }}</span>
    {% endif %}

</div>
