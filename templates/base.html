<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Django-Cotton-Demo</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
        <script src="//unpkg.com/alpinejs" defer></script>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: {
                                50: "#fafafa",
                                100: "#f5f5f5",
                                200: "#e5e5e5",
                                300: "#d4d4d4",
                                400: "#a3a3a3",
                                500: "#737373",
                                600: "#525252",
                                700: "#404040",
                                800: "#262626",
                                900: "#171717",
                                950: "#0a0a0a",
                            },
                        }
                    }
                }
            }
        </script>
    </head>

    <body class="p-5">
        {% block content %}
        {% endblock content %}
    </body>

</html>
